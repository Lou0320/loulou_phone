<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/guess.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="icon" href="../static/images/duo.ico" type="image/x-icon">
    <title>Loulou Phone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <img src="../static/images/logo.png" alt="Logo" class="logo">
    <h1>Tour <span id="tour-number">{{ tours }}</span> : Ecrivez une phrase</h1>
    <p>Vous avez <span id="countdown">20</span> secondes pour entrer votre phrase.</p>
    
    <h3>Décrivez ce dessin :</h3>
    <div class="drawing-container">
        <div class="lavender-left"></div>
        <div class="drawing-wrapper">
            <img id="previous-drawing" src="{{ drawing }}" alt="Dessin précédent">
        </div>
        <div class="lavender-right"></div>
    </div>
    
    <input type="text" id="sentence" placeholder="Votre phrase" required>
    <p id="progress-info"></p>
    
    <script>
        const socket = io();
        let countdown = 60;
        let hasSubmitted = false;
        const playerId = parseInt("{{ player_id }}");
        const groupCode = "{{ group_code }}";
        
        // Join the room for this group code when the page loads
        socket.emit("join_lobby", {
            group_code: groupCode
        });
        
        // If no drawing is displayed, request it
        if (!document.getElementById("previous-drawing").src || 
            document.getElementById("previous-drawing").src === window.location.href) {
            socket.emit("get_previous_drawing", {
                group_code: groupCode,
                player_id: playerId
            });
        }
        
        // Receive the previous drawing
        socket.on("previous_drawing", function(data) {
            if (data.drawing) {
                document.getElementById("previous-drawing").src = data.drawing;
            }
        });
        
        // Synchroniser le numéro du tour
        socket.on("sync_tour", function(data) {
            document.getElementById("tour-number").innerText = data.tours;
        });
        
        // Afficher le progrès des joueurs
        socket.on("progress_update", function(data) {
            document.getElementById("progress-info").innerText = 
                data.completed + " joueurs sur " + data.total + " ont terminé";
        });
        
        // Passer à la page suivante quand tous les joueurs ont terminé
        socket.on("all_completed", function(data) {
            if (data.next_page === "drawing") {
                window.location.href = "/drawing/" + groupCode;
            } else if (data.next_page.startsWith("/fin")) {
                window.location.href = data.next_page;
            }
        });

        // Fonction pour le décompte
        const intervalId = setInterval(function() {
            countdown--;
            document.getElementById("countdown").textContent = countdown;

            if (countdown <= 0 && !hasSubmitted) {
                clearInterval(intervalId); // Arrêter le décompte
                submitGuess();
            }
        }, 1000);
        
        function submitGuess() {
            if (hasSubmitted) return;
            
            hasSubmitted = true;
            const guess = document.getElementById("sentence").value || "Je ne sais pas...";
            
            socket.emit("guess_submitted", {
                group_code: groupCode,
                guess: guess
            });
            
            document.getElementById("progress-info").innerText = "Phrase soumise, en attente des autres joueurs...";
            document.getElementById("sentence").disabled = true;
        }
        
        // Soumettre la phrase quand l'utilisateur appuie sur Entrée
        document.getElementById("sentence").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !hasSubmitted) {
                submitGuess();
            }
        });
    </script>
</body>
</html>
